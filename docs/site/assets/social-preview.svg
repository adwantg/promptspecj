<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">PromptSpec-J social preview</title>
  <desc id="desc">OpenAPI-style prompt contracts for Java and Spring AI</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#122033"/>
      <stop offset="100%" stop-color="#1b3a4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8bd3dd"/>
      <stop offset="100%" stop-color="#f4d35e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#081019" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="170" fill="#8bd3dd" opacity="0.08"/>
  <circle cx="1030" cy="520" r="220" fill="#f4d35e" opacity="0.08"/>
  <circle cx="180" cy="560" r="180" fill="#5bc0eb" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="70" y="68" width="1140" height="504" rx="28" fill="#0f1a2b" opacity="0.92"/>
    <rect x="70" y="68" width="1140" height="10" rx="5" fill="url(#accent)"/>
  </g>

  <g transform="translate(120 132)">
    <rect x="0" y="0" width="190" height="44" rx="22" fill="#183247"/>
    <text x="95" y="29" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#8bd3dd">JAVA + SPRING AI</text>

    <text x="0" y="120" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#f7fbff">PromptSpec-J</text>

    <text x="0" y="188" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="600" fill="#f4d35e">
      OpenAPI-style prompt contracts
    </text>
    <text x="0" y="232" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="600" fill="#f4d35e">
      for Java and Spring AI
    </text>

    <text x="0" y="320" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#c8d5e0">
      Validation, code generation, compatibility checks,
    </text>
    <text x="0" y="360" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#c8d5e0">
      and replayable prompt drift testing for backend teams.
    </text>

    <g transform="translate(0 420)">
      <rect x="0" y="0" width="214" height="52" rx="26" fill="#183247"/>
      <text x="107" y="33" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#f7fbff">BUILD-TIME VALIDATION</text>

      <rect x="234" y="0" width="188" height="52" rx="26" fill="#183247"/>
      <text x="328" y="33" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#f7fbff">JAVA CODEGEN</text>

      <rect x="442" y="0" width="248" height="52" rx="26" fill="#183247"/>
      <text x="566" y="33" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#f7fbff">PROMPT DRIFT TESTING</text>
    </g>
  </g>

  <g transform="translate(855 172)">
    <rect x="0" y="0" width="255" height="230" rx="24" fill="#12273a" stroke="#29495c" stroke-width="2"/>
    <text x="24" y="42" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700" fill="#8bd3dd">promptspec/v1alpha1</text>
    <text x="24" y="82" font-family="Menlo, Consolas, monospace" font-size="21" fill="#f7fbff">id: article.summary</text>
    <text x="24" y="116" font-family="Menlo, Consolas, monospace" font-size="21" fill="#f7fbff">version: 1.0.0</text>
    <text x="24" y="150" font-family="Menlo, Consolas, monospace" font-size="21" fill="#f7fbff">output: java-type</text>
    <text x="24" y="184" font-family="Menlo, Consolas, monospace" font-size="21" fill="#f7fbff">tool: weather.lookup</text>
  </g>

  <g transform="translate(875 430)">
    <path d="M0 30 L42 0 L84 30 L84 94 L42 124 L0 94 Z" fill="#f4d35e"/>
    <path d="M118 18 H246" stroke="#8bd3dd" stroke-width="10" stroke-linecap="round"/>
    <path d="M118 52 H228" stroke="#8bd3dd" stroke-width="10" stroke-linecap="round"/>
    <path d="M118 86 H256" stroke="#8bd3dd" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
